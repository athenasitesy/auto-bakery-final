name: Deploy Athena Site

on:
  push:
    branches: [ main, 'feat/**', 'fix/**' ]
  repository_dispatch:
    types: [ publish_button ]

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build project
        run: |
          BRANCH_NAME="${{ github.ref_name }}"
          if [ "$BRANCH_NAME" = "main" ]; then
            pnpm build
          else
            # MULTIVERSE: Build for branch-specific subfolder (Preview Slot)
            REPO_NAME=$(echo "${{ github.repository }}" | cut -d'/' -f2)
            export VITE_BASE_URL="/$REPO_NAME/$BRANCH_NAME/"
            pnpm build --base="/$REPO_NAME/$BRANCH_NAME/"
          fi

      - name: Deploy to GitHub Pages (Main)
        if: github.ref_name == 'main'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          keep_files: true

      - name: Deploy to GitHub Pages (Branch Slot)
        if: github.ref_name != 'main'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          destination_dir: ${{ github.ref_name }}
          keep_files: true